<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>LumenForge RPG v5 — Table Ready</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="styles/themes.css" />
  <link rel="stylesheet" href="styles/appearance.css" />
  <link rel="stylesheet" href="styles/compact.css" />
  <link rel="stylesheet" href="styles/mobile.css" />
  <script>
    (function () {
      var theme = localStorage.getItem('lumenforge_theme') || 'midnight';
      if (theme === 'forge') theme = 'midnight';
      document.documentElement.setAttribute('data-theme', theme);
      var appearance = localStorage.getItem('lumenforge_appearance') || 'dark';
      document.documentElement.setAttribute('data-appearance', appearance === 'light' ? 'light' : 'dark');
    })();
  </script>
</head>
<body>
  <button type="button" id="sidebar-backdrop" class="sidebar-backdrop" hidden aria-label="Close menu"></button>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand-block">
        <div class="brand-mark">✦</div>
        <div class="brand-copy">
          <h1>LumenForge RPG</h1>
          <p>v5 · Table Ready — character sheet &amp; play aid</p>
          <div id="appearance-toggle" class="appearance-toggle" role="group" aria-label="Light or dark mode"></div>
          <div id="theme-picker" class="theme-picker" role="group" aria-label="Colour theme"></div>
        </div>
      </div>

      <section class="sidebar-create-panel create-card">
        <h2>Create Character</h2>
        <div class="sidebar-create-body">
        <label class="field-label" for="new-name">Name</label>
        <input id="new-name" class="input" placeholder="e.g. Nero the Reckless" />
        <label class="field-label" for="new-race">Race</label>
        <select id="new-race" class="input"></select>
        <label class="field-label" for="new-background">Background</label>
        <select id="new-background" class="input"></select>
        <p id="background-preview" class="subtle create-preview"></p>
        <div id="create-extras"></div>
        <button type="button" id="create-character" class="primary-btn full">Create</button>
        </div>
      </section>

      <section class="side-section">
        <div class="section-title-row">
          <h2>Characters</h2>
          <div class="section-title-actions">
            <button type="button" class="ghost-btn tiny" data-create-character-folder title="Create folder">+ Folder</button>
            <button type="button" id="collapse-sidebar" class="ghost-btn tiny" aria-label="Toggle sidebar">☰</button>
          </div>
        </div>
        <div id="character-list" class="character-list"></div>
      </section>

      <section class="side-actions">
        <button type="button" id="export-all" class="ghost-btn full">Export Save</button>
        <label class="ghost-btn full file-label">Import Save<input id="import-save" type="file" accept="application/json" hidden /></label>
      </section>
    </aside>

    <main class="main-panel">
      <header class="topbar">
        <button type="button" id="open-sidebar" class="icon-btn sidebar-toggle-btn" aria-label="Toggle sidebar">☰</button>
        <div class="current-hero">
          <div class="avatar" id="current-avatar">?</div>
          <div>
            <h2 id="current-name">No character selected</h2>
            <p id="current-subtitle">Create or select a character to begin.</p>
          </div>
        </div>
        <div class="resource-strip">
          <div class="resource"><span>Lumens</span><strong id="lumens-pill">0</strong></div>
          <div class="resource"><span>HP</span><strong id="hp-pill">0/0</strong></div>
          <div class="resource"><span>Stamina</span><strong id="stamina-pill">0/0</strong></div>
          <div class="resource"><span>Gil</span><strong id="coin-pill">0 Gil</strong></div>
        </div>
      </header>

      <nav class="tabbar" id="tabbar" role="tablist" aria-label="Character sections">
        <button type="button" role="tab" data-tab="character" class="active" aria-selected="true" aria-controls="app-content">Character</button>
        <button type="button" role="tab" data-tab="skills" aria-selected="false" aria-controls="app-content">Skills</button>
        <button type="button" role="tab" data-tab="stats" aria-selected="false" aria-controls="app-content">Stats</button>
        <button type="button" role="tab" data-tab="shop" aria-selected="false" aria-controls="app-content">Shop</button>
        <button type="button" role="tab" data-tab="craft" aria-selected="false" aria-controls="app-content">Craft</button>
        <button type="button" role="tab" data-tab="homebrew" aria-selected="false" aria-controls="app-content">Homebrew</button>
        <button type="button" role="tab" data-tab="gm" aria-selected="false" aria-controls="app-content">GM Tools</button>
        <button type="button" role="tab" data-tab="notes" aria-selected="false" aria-controls="app-content">Notes</button>
        <button type="button" role="tab" data-tab="howtoplay" aria-selected="false" aria-controls="app-content">How to Play</button>
      </nav>

      <section id="app-content" class="content" role="tabpanel" tabindex="-1"></section>
    </main>
  </div>

  <footer id="action-bar" class="action-bar" hidden aria-label="Action bar"></footer>

  <div id="action-bar-skill-sheet" class="action-bar-skill-sheet" hidden>
    <button type="button" class="action-bar-skill-sheet-backdrop" data-close-skill-sheet aria-label="Close skill details"></button>
    <div class="action-bar-skill-sheet-panel" role="dialog" aria-modal="true" aria-labelledby="action-bar-skill-sheet-content">
      <div id="action-bar-skill-sheet-content" class="action-bar-skill-sheet-content"></div>
      <div class="action-bar-skill-sheet-actions">
        <button type="button" class="ghost-btn" data-close-skill-sheet>Cancel</button>
        <button type="button" class="primary-btn" id="action-bar-skill-sheet-use">Use Skill</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <div id="hover-tooltip" class="floating-tooltip" role="tooltip" aria-hidden="true"></div>

  <!-- Bump ?v= when deploying so browsers pick up new JS modules (GitHub Pages caches aggressively). -->
  <script type="module" src="js/main.js?v=5.2-table-ready"></script>
</body>
</html>
